name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  python-lint:
    name: Python Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install ruff
      - name: Ruff lint
        run: ruff check central_py/ peripheral_py/ tools/*.py
      - name: Ruff format check
        run: ruff format --check central_py/ peripheral_py/ tools/*.py

  python-test:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          pip install pytest pytest-asyncio protobuf bleak
          pip install git+https://github.com/tdaira/blerpc-protocol.git
      - name: Run unit tests
        working-directory: central_py
        run: python -m pytest tests/test_container.py tests/test_command.py tests/test_client.py tests/test_encryption.py -v

  c-lint:
    name: C Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: clang-format check
        run: |
          find peripheral_fw/src central_fw/src \( -name '*.c' -o -name '*.h' \) \
            | grep -v -E '(generated_|blerpc\.pb\.)' \
            | xargs clang-format --dry-run --Werror

  android-build:
    name: Android Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - name: Lint
        working-directory: central_android
        run: ./gradlew ktlintCheck
      - name: Build
        working-directory: central_android
        run: ./gradlew assembleDebug
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  ios-build:
    name: iOS Build
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: brew install xcodegen swiftlint
      - name: SwiftLint
        working-directory: central_ios
        run: swiftlint
      - name: Generate Xcode project
        working-directory: central_ios
        run: xcodegen generate
      - name: Build
        working-directory: central_ios
        run: |
          xcodebuild -project BlerpcCentral.xcodeproj \
            -scheme BlerpcCentral \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            build

  rn-build:
    name: React Native Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - name: Install dependencies
        working-directory: central_rn
        run: npm ci
      - name: Lint
        working-directory: central_rn
        run: npx eslint src/ --ignore-pattern 'src/proto/'
      - name: Format check
        working-directory: central_rn
        run: npx prettier --check 'src/**/*.{ts,tsx}'
      - name: Android build
        working-directory: central_rn/android
        run: ./gradlew assembleDebug

  flutter-build:
    name: Flutter Build & Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.x'
      - name: Install dependencies
        working-directory: central_flutter
        run: flutter pub get
      - name: Analyze
        working-directory: central_flutter
        run: dart analyze --fatal-infos
      - name: Format check
        working-directory: central_flutter
        run: dart format --output=none --set-exit-if-changed lib/ test/
      - name: Test
        working-directory: central_flutter
        run: flutter test
