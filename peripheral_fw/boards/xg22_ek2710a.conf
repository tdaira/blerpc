# EFR32xG22E: 32 KB RAM
# blerpc assembler buffer (small — echo/flash_read requests are tiny)
CONFIG_BLERPC_PROTOCOL_ASSEMBLER_BUF_SIZE=256

# Fewer TX buffers (1 connection only)
CONFIG_BT_L2CAP_TX_BUF_COUNT=3
CONFIG_BT_BUF_ACL_TX_COUNT=3
CONFIG_BT_CONN_TX_MAX=3
CONFIG_BT_BUF_ACL_RX_COUNT=3

# BT stack memory — minimum viable for Silicon Labs HCI
CONFIG_BT_SILABS_HCI_BUFFER_MEMORY=3360
CONFIG_COMMON_LIBC_MALLOC_ARENA_SIZE=6144
CONFIG_MAIN_STACK_SIZE=1536
CONFIG_BLERPC_WORK_STACK_SIZE=1536
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=512
CONFIG_BT_RX_STACK_SIZE=768

# Disable encryption and double buffer (not enough RAM)
CONFIG_BLERPC_DOUBLE_BUFFER=n
CONFIG_BLERPC_PROTOCOL_CRYPTO=n
CONFIG_BLERPC_ENCRYPTION=n
CONFIG_HEAP_MEM_POOL_SIZE=0

# Disable all PSA/mbedTLS crypto (inherited from prj.conf, not needed on xg22)
CONFIG_MBEDTLS=n
CONFIG_MBEDTLS_PSA_CRYPTO_C=n
CONFIG_PSA_WANT_ALG_ECDH=n
CONFIG_PSA_WANT_ECC_MONTGOMERY_255=n
CONFIG_PSA_WANT_KEY_TYPE_ECC_KEY_PAIR_IMPORT=n
CONFIG_PSA_WANT_KEY_TYPE_ECC_KEY_PAIR_EXPORT=n
CONFIG_PSA_WANT_KEY_TYPE_ECC_KEY_PAIR_DERIVE=n
CONFIG_PSA_WANT_KEY_TYPE_ECC_PUBLIC_KEY=n
CONFIG_PSA_WANT_ALG_PURE_EDDSA=n
CONFIG_PSA_WANT_ECC_TWISTED_EDWARDS_255=n
CONFIG_PSA_WANT_KEY_TYPE_AES=n
CONFIG_PSA_WANT_ALG_GCM=n
CONFIG_PSA_WANT_ALG_HKDF=n
CONFIG_PSA_WANT_ALG_SHA_512=n

# Disable flash to free RAM for RTT logging
CONFIG_FLASH=n

# Disable UART — use RTT console instead
CONFIG_UART_CONSOLE=n
CONFIG_SERIAL=n

# Minimal logging via RTT (printk → RTT console)
CONFIG_LOG=y
CONFIG_LOG_MODE_MINIMAL=y
CONFIG_CONSOLE=y
CONFIG_USE_SEGGER_RTT=y
CONFIG_RTT_CONSOLE=y
CONFIG_LOG_BACKEND_RTT=n
CONFIG_LOG_BACKEND_UART=n
CONFIG_SEGGER_RTT_BUFFER_SIZE_UP=128
